<script>
// ============================================================
// HIGH PERFORMANCE MOBILE ENGINE
// ============================================================

const DB_NAME = 'StudyVaultFS', DB_VER = 1, ROOT_ID = 'root';
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('nodes')) {
        db.createObjectStore('nodes',{keyPath:'id'}).createIndex('parentId','parentId',{unique:false});
      }
      if (!db.objectStoreNames.contains('filedata')) db.createObjectStore('filedata',{keyPath:'id'});
      if (!db.objectStoreNames.contains('prefs'))    db.createObjectStore('prefs',{keyPath:'key'});
    };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror   = () => rej(new Error('DB open failed'));
  });
}

function dbTx(store, mode, fn) {
  return openDB().then(db => new Promise((res, rej) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const rq = fn(s);
    if (rq && rq.onsuccess !== undefined) { rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }
    else { t.oncomplete = res; t.onerror = () => rej(t.error); }
  }));
}

function genId() { return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7); }

async function ensureRoot() {
  let n = await dbTx('nodes','readonly', s => s.get(ROOT_ID));
  if (!n) {
    n = {id:ROOT_ID,name:'StudyVault',type:'folder',parentId:null,timestamp:Date.now(),size:0};
    await dbTx('nodes','readwrite', s => s.put(n));
  }
  return n;
}

function dbGet(id) { return dbTx('nodes','readonly', s => s.get(id)); }

function dbGetChildrenSafe(pid) {
  return openDB().then(db => new Promise((res,rej)=>{
    const t = db.transaction('nodes','readonly');
    const r = t.objectStore('nodes').index('parentId').getAll(pid);
    r.onsuccess = () => res(r.result||[]);
    r.onerror   = () => rej(r.error);
  }));
}

function dbCreate(name,type,parentId,extra={}) {
  const n = {id:genId(),name,type,parentId,timestamp:Date.now(),size:extra.size||0,mimeType:extra.mimeType||''};
  return dbTx('nodes','readwrite', s => s.add(n)).then(()=>n);
}

async function dbUpdate(id,updates) {
  const n = await dbGet(id);
  if (!n) throw new Error('Item not found');
  const u = {...n,...updates};
  await dbTx('nodes','readwrite', s => s.put(u));
  return u;
}

async function dbDelete(id) {
  const children = await dbGetChildrenSafe(id);
  for (const c of children) await dbDelete(c.id);
  await openDB().then(db => new Promise(res=>{ const t=db.transaction('filedata','readwrite'); t.objectStore('filedata').delete(id).onsuccess=res; }));
  await dbTx('nodes','readwrite', s => s.delete(id));
}

function dbSaveFile(id,buffer) { return dbTx('filedata','readwrite', s => s.put({id,buffer})); }
function dbGetFile(id)         { return openDB().then(db => new Promise((res,rej)=>{ const t=db.transaction('filedata','readonly'); const r=t.objectStore('filedata').get(id); r.onsuccess=()=>res(r.result?.buffer||null); r.onerror=()=>rej(r.error); })); }

function dbGetAll() {
  return openDB().then(db => new Promise((res,rej)=>{
    const t=db.transaction('nodes','readonly'); const r=t.objectStore('nodes').getAll();
    r.onsuccess=()=>res((r.result||[]).filter(n=>n.id!==ROOT_ID)); r.onerror=()=>rej(r.error);
  }));
}

async function dbClearAll() {
  const db = await openDB();
  for (const s of ['nodes','filedata','prefs']) {
    await new Promise(res=>{ const t=db.transaction(s,'readwrite'); t.objectStore(s).clear().onsuccess=res; });
  }
}

// ---- FAST STORAGE MEMORY CACHE ----
const _nodeCache = new Map();
let _rootNode = null;
let _currentFilter = 'all';

async function initStorage() {
  await openDB();
  _rootNode = await ensureRoot();
  _nodeCache.set(ROOT_ID, {..._rootNode, directory:true});
}

function getVaultFolder() { return _rootNode || {id:ROOT_ID,name:'StudyVault',type:'folder',directory:true}; }
function getNodeById(id)  { return _nodeCache.get(id)||null; }

async function listFolder(folder) {
  const pid = folder?.id||ROOT_ID;
  const children = await dbGetChildrenSafe(pid);
  const folders=[], files=[];
  for (const n of children) {
    if (n.type==='folder') {
      const sub = await dbGetChildrenSafe(n.id);
      const e = {...n,directory:true,childCount:sub.length,ext:''};
      folders.push(e); _nodeCache.set(n.id,e);
    } else {
      const e = {...n,directory:false,ext:getExt(n.name)};
      files.push(e); _nodeCache.set(n.id,e);
    }
  }
  folders.sort((a,b)=>a.name.localeCompare(b.name));
  files.sort((a,b)=>a.name.localeCompare(b.name));
  return {folders,files};
}

async function createFolder(name,parent) {
  const pid=parent?.id||ROOT_ID, clean=sanitize(name);
  if (!clean) throw new Error('Invalid name');
  const kids = await dbGetChildrenSafe(pid);
  if (kids.find(c=>c.type==='folder'&&c.name.toLowerCase()===clean.toLowerCase())) throw new Error(`"${clean}" already exists`);
  const n = await dbCreate(clean,'folder',pid);
  const e = {...n,directory:true,childCount:0,ext:''};
  _nodeCache.set(n.id,e); return e;
}

async function renameNode(id,name) {
  const clean=sanitize(name); if(!clean) throw new Error('Invalid name');
  const u = await dbUpdate(id,{name:clean});
  const c=_nodeCache.get(id); if(c) _nodeCache.set(id,{...c,name:clean});
  return u;
}

async function moveNode(id,targetId) {
  const u = await dbUpdate(id,{parentId:targetId});
  const c=_nodeCache.get(id); if(c) _nodeCache.set(id,{...c,parentId:targetId});
  return u;
}

async function deleteNode(id) { await dbDelete(id); _nodeCache.delete(id); }

async function uploadFile(file,folder,onProgress) {
  const pid=folder?.id||ROOT_ID;
  const buf = await readFile(file,onProgress);
  const n = await dbCreate(file.name,'file',pid,{size:file.size,mimeType:file.type||''});
  await dbSaveFile(n.id,buf);
  if (onProgress) onProgress(100,file.size,file.size);
  const e={...n,directory:false,ext:getExt(file.name)};
  _nodeCache.set(n.id,e); return e;
}

async function triggerDownload(id) {
  const n=await dbGet(id); if(!n) throw new Error('File not found');
  const buf=await dbGetFile(id); if(!buf) throw new Error('File data missing');
  const blob=new Blob([buf],{type:n.mimeType||'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=n.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

async function getAllNodes() {
  const all=await dbGetAll();
  const map={};
  for (const n of all) { map[n.id]=n; _nodeCache.set(n.id,{...n,directory:n.type==='folder',ext:getExt(n.name)}); }
  function getPath(nid) {
    const parts=[]; let c=map[nid];
    while(c&&c.parentId&&c.parentId!==ROOT_ID){parts.unshift(c.name);c=map[c.parentId];}
    if(c) parts.unshift(c.name); return parts.join(' / ');
  }
  return all.map(n=>({id:n.id,name:n.name,type:n.type,path:getPath(n.id),parentId:n.parentId,size:n.size||0,timestamp:n.timestamp,ext:n.type==='file'?getExt(n.name):''}));
}

async function getRecentFiles(limit) {
  const all=await getAllNodes();
  return all.filter(n=>n.type==='file').sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).slice(0,limit||10);
}

async function getAllFolders(pid,depth) {
  pid=pid||ROOT_ID; depth=depth||0;
  const res=[]; if(!depth) res.push({id:ROOT_ID,name:'StudyVault',depth:0});
  const kids=await dbGetChildrenSafe(pid);
  for (const c of kids) {
    if (c.type==='folder') { res.push({id:c.id,name:c.name,depth:depth+1}); res.push(...(await getAllFolders(c.id,depth+1))); }
  }
  return res;
}

async function getQuotaInfo() {
  const all=await dbGetAll();
  return {used:all.reduce((s,n)=>s+(n.size||0),0),unlimited:true};
}

function getUserInfo() { return {name:'Study Vault',email:'Stored on device'}; }

// ---- Helpers ----
function readFile(file,onProgress) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onprogress=e=>{ if(onProgress&&e.lengthComputable) onProgress(Math.round((e.loaded/e.total)*90),e.loaded,e.total); };
    r.onload=e=>res(e.target.result);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsArrayBuffer(file);
  });
}
function getExt(f) { if(!f)return''; const p=f.toLowerCase().split('.'); return p.length>1?p.pop():''; }
function sanitize(n) { return String(n||'').trim().replace(/[\/\\:*?"<>|]/g,'').slice(0,255); }
function fmtSize(b) { if(!b)return'0 B'; const s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(1024)); return `${(b/Math.pow(1024,i)).toFixed(i?1:0)} ${s[i]}`; }
function fmtDate(ts) { if(!ts)return''; return new Date(ts).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }
function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escA(s) { return String(s||'').replace(/"/g,'&quot;'); }
function fileIconCls(ext,isFolder) {
  if(isFolder)return'file-icon-folder';
  if(ext==='pdf')return'file-icon-pdf';
  if(['jpg','jpeg','png','webp','gif','svg','bmp'].includes(ext))return'file-icon-image';
  if(['doc','docx','ppt','pptx','xls','xlsx','odt'].includes(ext))return'file-icon-doc';
  if(['java','c','cpp','py','js','ts','html','css','rb','go','rs','sh','sql','json','xml','yaml','md','ipynb'].includes(ext))return'file-icon-code';
  if(['zip','rar','7z','tar','gz'].includes(ext))return'file-icon-zip';
  return'file-icon-txt';
}
function fileEmoji(ext) {
  return({pdf:'📄',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',webp:'🖼️',gif:'🖼️',svg:'🖼️',doc:'📝',docx:'📝',ppt:'📊',pptx:'📊',xls:'📈',xlsx:'📈',py:'🐍',js:'💛',ts:'💛',html:'🌐',css:'🎨',java:'⚙️',c:'⚙️',cpp:'⚙️',sql:'🗄️',json:'📋',xml:'📋',yaml:'📋',md:'📋',ipynb:'📓',zip:'🗜️',rar:'🗜️','7z':'🗜️'})[ext]||'📄';
}

// ---- FAST SEARCH ----
let _searchIdx=[];
async function buildIdx() { try{ _searchIdx=await getAllNodes(); }catch(_){} }
function doSearch(q) {
  if(!q) return[];
  const terms=q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const res=[];
  for(const n of _searchIdx){
    const name=(n.name||'').toLowerCase(), path=(n.path||'').toLowerCase();
    let score=0,ok=true;
    for(const t of terms){
      if(name===t)score+=100;
      else if(name.startsWith(t))score+=60;
      else if(name.includes(t))score+=30;
      else if(path.includes(t))score+=10;
      else{ok=false;break;}
    }
    if(ok&&score>0) res.push({...n,score});
  }
  return res.sort((a,b)=>{if(a.type!==b.type)return a.type==='folder'?-1:1;return b.score-a.score;}).slice(0,60);
}
function hlText(text,q) {
  if(!q||!text)return esc(text||'');
  const re=new RegExp('('+q.trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark class="highlight">$1</mark>');
}

// ---- PARALLEL FAST UPLOAD ----
const BLOCKED_EXT=new Set(['mp4','avi','mov','wmv','mkv','flv','webm','mp3','wav','ogg','aac','m4a','flac','exe','msi','dmg','apk']);
let _upQueue=[], _upBusy=false, _upFolder=null, _upDone=null;

function setUploadTarget(f,cb){_upFolder=f;_upDone=cb;}
function validateFile(file){
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  if(BLOCKED_EXT.has(ext)) return{ok:false,reason:`Not allowed: .${ext}`};
  if((file.type||'').startsWith('video/')||(file.type||'').startsWith('audio/')) return{ok:false,reason:'Videos/audio not allowed'};
  return{ok:true};
}
function queueFiles(files){
  for(const f of files){
    const v=validateFile(f);
    if(v.ok) _upQueue.push({id:'u'+Date.now()+Math.random().toString(36).slice(2),file:f,status:'pending',progress:0,error:null});
    else showToast(v.reason,'error');
  }
  renderQueue();
}
function renderQueue(){
  const c=document.getElementById('upload-queue'); if(!c)return;
  c.innerHTML=_upQueue.map(i=>upItemHTML(i)).join('');
  const btn=document.getElementById('upload-start-btn');
  if(btn) btn.disabled=_upBusy||!_upQueue.some(i=>i.status==='pending');
}
function upItemHTML(item){
  const{id,file,status,progress,error}=item;
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  let st='',pb='';
  if(status==='pending') st=`Ready · ${fmtSize(file.size)}`;
  if(status==='uploading'){st=`Uploading ${progress}%`;pb=`<div class="progress-bar upload-item-progress"><div class="progress-fill" style="width:${progress}%"></div></div>`;}
  if(status==='done') st='✓ Done';
  if(status==='error') st='✗ '+error;
  const col=status==='error'?'var(--danger)':status==='done'?'var(--success)':'var(--text-tertiary)';
  return`<div class="upload-item" id="ui-${id}"><div class="upload-item-icon"><div class="file-icon">${fileEmoji(ext)}</div></div><div class="upload-item-info"><div class="upload-item-name">${esc(file.name)}</div><div class="upload-item-status" style="color:${col}">${st}</div>${pb}</div></div>`;
}
function updateUpItem(item){
  const e=document.getElementById('ui-'+item.id);
  if(e)e.outerHTML=upItemHTML(item); else renderQueue();
  const btn=document.getElementById('upload-start-btn');
  if(btn) btn.disabled=_upBusy||!_upQueue.some(i=>i.status==='pending');
}

async function startUploads(){
  if(_upBusy)return; _upBusy=true;
  const pending = _upQueue.filter(i=>i.status==='pending');

  const uploadOne = async (item) => {
    item.status='uploading'; updateUpItem(item);
    try{
      await uploadFile(item.file,_upFolder,pct=>{item.progress=pct;updateUpItem(item);});
      item.status='done'; item.progress=100; updateUpItem(item);
    }catch(err){
      item.status='error';item.error=err.message;updateUpItem(item);showToast('Upload failed: '+item.file.name,'error');
    }
  };

  const batchSize = 3;
  for (let i = 0; i < pending.length; i += batchSize) {
    const chunk = pending.slice(i, i + batchSize);
    await Promise.all(chunk.map(item => uploadOne(item)));
  }

  _upBusy=false;
  const done=_upQueue.filter(i=>i.status==='done').length;
  if(done>0){showToast(done+' file'+(done>1?'s':'')+' uploaded!','success');if(_upDone)_upDone();}
  setTimeout(()=>{_upQueue=[];renderQueue();},1500);
}

function setupDropzone(dz,fi){
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');queueFiles(Array.from(e.dataTransfer.files));});
  dz.addEventListener('click',()=>fi.click());
  fi.addEventListener('change',()=>{queueFiles(Array.from(fi.files));fi.value='';});
}

// ---- FAST PREVIEW ----
const IMG_EXT=new Set(['jpg','jpeg','png','webp','gif','svg','bmp']);
const PDF_EXT=new Set(['pdf']);
const CODE_EXT=new Set(['txt','md','html','css','js','ts','jsx','tsx','json','xml','yaml','yml','py','java','c','cpp','h','rb','go','rs','sh','sql','csv','log']);
const ARCH_EXT=new Set(['zip','rar','7z','tar','gz','bz2']);

async function openPreview(fileObj){
  const ov=document.getElementById('preview-overlay');
  if(!ov)return;
  ov.classList.remove('hidden');
  document.getElementById('preview-filename').textContent=fileObj.name;
  const se=document.getElementById('preview-size'),de=document.getElementById('preview-date');
  if(se)se.textContent=fmtSize(fileObj.size);
  if(de)de.textContent=fmtDate(fileObj.timestamp);
  const body=document.getElementById('preview-body');
  body.innerHTML='<div style="display:flex;align-items:center;gap:12px;color:var(--text-tertiary);font-size:14px"><div class="spinner" style="border-color:rgba(255,255,255,.15);border-top-color:var(--accent)"></div>Loading…</div>';
  document.getElementById('preview-download-btn').onclick=()=>triggerDownload(fileObj.id).catch(e=>showToast(e.message,'error'));
  const ext=getExt(fileObj.name);
  try{
    const buf=await dbGetFile(fileObj.id);
    if(!buf)throw new Error('File data not found');
    if(IMG_EXT.has(ext)){
      const mime={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',webp:'image/webp',gif:'image/gif',svg:'image/svg+xml',bmp:'image/bmp'}[ext]||'image/jpeg';
      const url=URL.createObjectURL(new Blob([buf],{type:mime}));
      body.innerHTML=`<img class="preview-img" src="${url}" alt="${esc(fileObj.name)}"/>`;
    }else if(PDF_EXT.has(ext)){
      const url=URL.createObjectURL(new Blob([buf],{type:'application/pdf'}));
      body.innerHTML=`<iframe class="preview-iframe" src="${url}#toolbar=1"></iframe>`;
    }else if(CODE_EXT.has(ext)){
      const text=new TextDecoder('utf-8',{fatal:false}).decode(buf);
      const langMap={py:'python',js:'javascript',ts:'typescript',html:'html',css:'css',java:'java',c:'c',cpp:'cpp',sh:'bash',sql:'sql',json:'json',xml:'xml',yaml:'yaml',yml:'yaml',md:'markdown'};
      const lang=langMap[ext]||'none';
      body.innerHTML=`<div class="preview-code-wrap"><pre><code class="language-${lang}">${esc(text)}</code></pre></div>`;
      loadPrism();
    }else if(ARCH_EXT.has(ext)){
      body.innerHTML=`<div class="preview-unsupported"><div class="preview-unsupported-icon">🗜️</div><h3 style="color:var(--text-primary);margin-top:12px">${esc(fileObj.name)}</h3><p>Archive preview not available</p><button class="btn btn-primary" onclick="triggerDownload('${fileObj.id}')">⬇️ Download</button></div>`;
    }else{
      body.innerHTML=`<div class="preview-unsupported"><div class="preview-unsupported-icon">📄</div><h3 style="color:var(--text-primary);margin-top:12px">${esc(fileObj.name)}</h3><p>Preview not available for .${ext} files</p><button class="btn btn-primary" onclick="triggerDownload('${fileObj.id}')">⬇️ Download</button></div>`;
    }
  }catch(err){
    body.innerHTML=`<div class="preview-unsupported"><div class="preview-unsupported-icon">⚠️</div><p style="color:var(--danger)">${esc(err.message)}</p><button class="btn btn-primary" onclick="triggerDownload('${fileObj.id}')">⬇️ Download</button></div>`;
  }
}
function closePreview(){
  const ov=document.getElementById('preview-overlay');
  if(ov)ov.classList.add('hidden');
  const body=document.getElementById('preview-body');
  if(body){
    body.querySelectorAll('img,iframe').forEach(el=>{if(el.src?.startsWith('blob:'))URL.revokeObjectURL(el.src);});
    body.innerHTML='';
  }
}
function loadPrism(){
  if(window.Prism)return void Prism.highlightAll();
  const lnk=document.createElement('link');lnk.rel='stylesheet';lnk.href='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css';document.head.appendChild(lnk);
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js';
  s.onload=()=>{const al=document.createElement('script');al.src='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js';al.onload=()=>Prism.highlightAll();document.head.appendChild(al);};
  document.head.appendChild(s);
}

function showToast(msg,type,dur){
  const c=document.getElementById('toast-container'); if(!c)return;
  const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const t=document.createElement('div'); t.className=`toast toast-${type||'info'}`;

function setCategoryFilter(catId) {
  _currentFilter = catId;

function filterByCat(item) {
  if (_currentFilter === 'all') return true;
  if (item.type === 'folder') return true;
  const ext = item.ext || getExt(item.name);
  if (_currentFilter === 'pdf') return ext === 'pdf';
  if (_currentFilter === 'image') return IMG_EXT.has(ext);
  if (_currentFilter === 'doc') return ['doc','docx','ppt','pptx','xls','xlsx','odt','txt'].includes(ext);
  if (_currentFilter === 'code') return CODE_EXT.has(ext);
  return true;
}

  const m=document.getElementById('context-menu'); if(!m)return;
  m.innerHTML=`
    ${type==='file'?`<div class="ctx-item" onclick="openPrev('${id}','${escA(name)}')">👁️ Preview</div>`:''}
    ${type==='file'?`<div class="ctx-item" onclick="triggerDownload('${id}').catch(e=>showToast(e.message,'error'))">⬇️ Download</div>`:''}
    ${type==='folder'?`<div class="ctx-item" onclick="(()=>{const n=getNodeById('${id}');if(n)navFolder(n);})()">📂 Open</div>`:''}
    <div class="ctx-item" onclick="openRenameModal('${id}','${escA(name)}')">✏️ Rename</div>
    <div class="ctx-item" onclick="openMoveModal(['${id}'])">📁 Move to…</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" onclick="openDeleteModal(['${id}'])">🗑️ Delete</div>`;
  m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';
  m.classList.remove('hidden');
  e.stopPropagation();
}
function openPrev(id,name){const n=getNodeById(id);openPreview({id,name,size:n?.size||0,timestamp:n?.timestamp||0});}

// ---- Modals ----
let _mctx={};
function showModal(id){document.getElementById('modal-overlay')?.classList.remove('hidden');document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));document.getElementById(id)?.classList.remove('hidden');}
function closeModal(){document.getElementById('modal-overlay')?.classList.add('hidden');document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));_mctx={};}
document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

function openRenameModal(id,name){_mctx={action:'rename',id};showModal('rename-modal');const inp=document.getElementById('rename-input');inp.value=name;inp.focus();inp.select();}
function openDeleteModal(ids){_mctx={action:'delete',ids:ids||[...ST.selectedIds]};const msg=document.getElementById('delete-msg');if(msg)msg.textContent=`Delete ${_mctx.ids.length} item${_mctx.ids.length!==1?'s':''}? Cannot be undone.`;showModal('delete-modal');}
function openMoveModal(ids){
  _mctx={action:'move',ids:ids||[...ST.selectedIds],targetId:null};
  const tree=document.getElementById('move-folder-tree');
  if(tree){
    getAllFolders().then(folders=>{
      tree.innerHTML=folders.map(f=>`<div class="folder-tree-item" data-fid="${f.id}" style="padding-left:${Math.max(f.depth*20,12)}px">📁 ${esc(f.name)}</div>`).join('');
      tree.querySelectorAll('.folder-tree-item').forEach(item=>{item.addEventListener('click',()=>{tree.querySelectorAll('.folder-tree-item').forEach(i=>i.classList.remove('selected'));item.classList.add('selected');_mctx.targetId=item.dataset.fid;});});
    });
  }
  showModal('move-modal');
}

document.getElementById('fab-new-folder')?.addEventListener('click',()=>{_mctx={action:'new'};showModal('new-folder-modal');const inp=document.getElementById('new-folder-input');inp.value='';inp.focus();});
document.getElementById('new-folder-create')?.addEventListener('click',async()=>{
  const name=document.getElementById('new-folder-input')?.value?.trim();
  if(!name)return;
  const btn=document.getElementById('new-folder-create');
  btn.disabled=true;btn.textContent='Creating…';
  try{await createFolder(name,ST.folder);closeModal();await renderFolders(ST.folder);buildIdx();showToast(`"${name}" created`,'success');}
  catch(err){showToast(err.message,'error');}
  finally{btn.disabled=false;btn.textContent='Create';}
});
document.getElementById('rename-input')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('rename-save').click();});
document.getElementById('rename-save')?.addEventListener('click',async()=>{
  const name=document.getElementById('rename-input')?.value?.trim();
  if(!name||!_mctx.id)return;
  try{await renameNode(_mctx.id,name);closeModal();await renderFolders(ST.folder);buildIdx();showToast('Renamed','success');}
  catch(err){showToast(err.message,'error');}
});
document.getElementById('delete-confirm')?.addEventListener('click',async()=>{
  const ids=_mctx.ids||[];closeModal();let ok=0;
  for(const id of ids){try{await deleteNode(id);ok++;}catch(err){showToast('Delete failed: '+err.message,'error');}}
  if(ok>0){showToast(ok+' item'+(ok>1?'s':'')+' deleted','success');await renderFolders(ST.folder);buildIdx();}
  exitSelect();
});
document.getElementById('move-confirm')?.addEventListener('click',async()=>{
  if(!_mctx.targetId){showToast('Select a folder','warning');return;}
  const ids=_mctx.ids||[];closeModal();let ok=0;
  for(const id of ids){try{await moveNode(id,_mctx.targetId);ok++;}catch(err){showToast('Move failed: '+err.message,'error');}}
  if(ok>0){showToast(ok+' item'+(ok>1?'s':'')+' moved','success');await renderFolders(ST.folder);buildIdx();}
  exitSelect();
});

// ---- Upload sheet ----
document.getElementById('upload-sheet-close')?.addEventListener('click',closeUploadSheet);
document.getElementById('upload-sheet-overlay')?.addEventListener('click',closeUploadSheet);
document.getElementById('upload-start-btn')?.addEventListener('click',startUploads);
setupDropzone(document.getElementById('dropzone'),document.getElementById('file-input'));

function openUploadSheet(){
  document.getElementById('upload-sheet-overlay')?.classList.remove('hidden');
  document.getElementById('upload-sheet')?.classList.remove('hidden');
  setUploadTarget(ST.folder,async()=>{await renderFolders(ST.folder);buildIdx();closeUploadSheet();});
}
function closeUploadSheet(){document.getElementById('upload-sheet-overlay')?.classList.add('hidden');document.getElementById('upload-sheet')?.classList.add('hidden');}

// ---- Preview overlay ----
document.getElementById('preview-close-btn')?.addEventListener('click',closePreview);
document.getElementById('preview-overlay')?.addEventListener('click',e=>{if(e.target===document.getElementById('preview-overlay'))closePreview();});

// ---- Navigation ----
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v=btn.dataset.view;
    if(v==='upload'){openUploadSheet();return;}
    showView(v);
  });
});
document.getElementById('logo-home')?.addEventListener('click',()=>showView('home'));
document.getElementById('theme-toggle-btn')?.addEventListener('click',()=>applyTheme(ST.theme==='dark'?'light':'dark'));

// ---- Search ----
const _searchInput=document.getElementById('header-search');
let _searchTimer;
_searchInput?.addEventListener('input',e=>{
  clearTimeout(_searchTimer);
  const q=e.target.value;
  _searchTimer=setTimeout(()=>{if(ST.view!=='search')showView('search');execSearch(q);},100);
});
_searchInput?.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(ST.view!=='search')showView('search');execSearch(_searchInput.value);}
  if(e.key==='Escape'){_searchInput.value='';if(ST.view==='search')showView('home');}
});

// ---- INSTANT INITIALIZATION ----
(async()=>{
  const ls=document.getElementById('loading-screen');
  const aw=document.getElementById('app-wrapper');

  const savedTheme=localStorage.getItem('sv_theme')||'dark';
  document.documentElement.setAttribute('data-theme',savedTheme);
  ST.theme=savedTheme;

  try{
    await initStorage();

    ST.folderStack=[{id:ROOT_ID,name:'StudyVault',node:getVaultFolder()}];
    ST.folder=getVaultFolder();

    showView('home');
    setTimeout(buildIdx, 50);

    if(ls){ls.style.opacity='0';setTimeout(()=>ls.style.display='none',150);}
    if(aw)aw.style.opacity='1';
  }catch(err){
    console.error('[App]',err);
  }
})();
</script>
</body>
</html>
